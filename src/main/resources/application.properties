spring.application.name=personalized-data-api

server.port=8080

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/personalization_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

## Connection Pool (HikariCP)
#spring.datasource.hikari.maximum-pool-size=20
#spring.datasource.hikari.minimum-idle=5
#spring.datasource.hikari.connection-timeout=30000
#
## Internal API Security
#internal.api.key=my-secret-api-key
#
## JWT
#jwt.secret=MyVerySecretKeyForJwtAuthentication123456
#jwt.expiration=86400000
#
## Logging
#logging.level.org.springframework.security=INFO
#logging.level.org.hibernate.SQL=DEBUG

# ------------------------------------------------------------------
# Actuator
# ------------------------------------------------------------------

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ------------------------------------------------------------------
# SpringDoc / Swagger
# ------------------------------------------------------------------

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.path=/v3/api-docs
